<div class="container my-container">
<div class="card justify-content-md-center">
    <div class="card-header text-center">
      <h2>S'inscrire</h2>
    </div>
    <div class="card-body">
        <div class="mb-3">
            <input type="text" class="form-control"   placeholder="Enter Code fiscal">
        </div>

        <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Enter email">
        </div>

        <div class="mb-3">
            <input type="text" class="form-control"   placeholder="Adresse 1">
        </div>


        <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Adresse 2">
        </div>

        <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Ville">
        </div>

         <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Code postal">
        </div>

         <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Pays">
        </div>

        <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Mot de passe">
        </div>

        <div class="mb-3">
            <input type="text" class="form-control"  placeholder="Confirmer Mot de passe">
        </div>



        <div class="mb-3 d-flex justify-content-between">
          
              <a [routerLink]="['/login']"  class="btn btn-link">S'inscrire</a>
            <a  class="btn btn-primary"><i class="fas fa-check"></i> S'inscrire</a>
        </div>
    </div>
</div>
</div>
